<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Alunos - Supabase</title>
    <style>
        :root {
            --primary: #3ecf8e;
            --danger: #ff4d4d;
            --dark: #1c1c1c;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        /* Formulários e Busca */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        input { width: calc(100% - 20px); padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { cursor: pointer; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-search { background: var(--dark); color: white; width: 100%; }
        button:hover { opacity: 0.8; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .actions { display: flex; gap: 5px; }
        .btn-edit { background: #ffc107; color: black; font-size: 12px; }
        .btn-del { background: var(--danger); color: white; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 Gestão de Alunos</h2>

    <div class="controls">
        <div class="card">
            <strong>Novo Aluno</strong>
            <input type="text" id="nomeNovo" placeholder="Nome Completo">
            <input type="email" id="emailNovo" placeholder="E-mail">
            <button class="btn-add" onclick="uiCriarAluno()">Cadastrar Aluno</button>
        </div>

        <div class="card">
            <strong>Pesquisar</strong>
            <input type="text" id="campoBusca" placeholder="Digite Nome ou ID..." oninput="uiProcurar()">
            <button class="btn-search" onclick="uiListarTodos()">Mostrar Todos</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaAlunos">
            </tbody>
    </table>
</div>

<script>
    // --- SUA CONFIGURAÇÃO ---
    const supabaseConfig = {
        url: 'https://cmzyyhqkulxadvowiolm.supabase.co/rest/v1/alunos',
        headers: {
            'apikey': 'sb_publishable_RECACbuM-FN164ryukMT7Q_3ZDNxNQI',
            'Authorization': 'Bearer sb_publishable_RECACbuM-FN164ryukMT7Q_3ZDNxNQI',
            'Content-Type': 'application/json',
            'Prefer': 'return=representation' 
        }
    };

    // --- FUNÇÕES CORE (Lógica de Banco) ---

    async function listarAlunos() {
        const response = await fetch(`${supabaseConfig.url}?select=*&order=id.asc`, { headers: supabaseConfig.headers });
        return await response.json();
    }

    async function criarAluno(nome, email) {
        const response = await fetch(supabaseConfig.url, {
            method: 'POST',
            headers: supabaseConfig.headers,
            body: JSON.stringify({ nome, email }) 
        });
        return await response.json();
    }

    async function atualizarAluno(id, novosDados) {
        const response = await fetch(`${supabaseConfig.url}?id=eq.${id}`, {
            method: 'PATCH',
            headers: supabaseConfig.headers,
            body: JSON.stringify(novosDados)
        });
        return await response.json();
    }

    async function deletarAluno(id) {
        await fetch(`${supabaseConfig.url}?id=eq.${id}`, {
            method: 'DELETE',
            headers: supabaseConfig.headers
        });
    }

    async function procurar(valor) {
        let query = isNaN(valor) ? `nome=ilike.*${valor}*` : `id=eq.${valor}`;
        const response = await fetch(`${supabaseConfig.url}?${query}&select=*`, { headers: supabaseConfig.headers });
        return await response.json();
    }

    // --- FUNÇÕES DE INTERFACE (UI) ---

    async function renderizarTabela(promessa) {
        const lista = await promessa;
        const corpoTabela = document.getElementById('tabelaAlunos');
        corpoTabela.innerHTML = "";

        lista.forEach(aluno => {
            const dataFormatada = aluno.data_cadastro ? aluno.data_cadastro.split('T')[0] : '-';
            corpoTabela.innerHTML += `
                <tr>
                    <td>${aluno.id}</td>
                    <td><strong id="nome-${aluno.id}">${aluno.nome}</strong></td>
                    <td>${aluno.email}</td>
                    <td>${dataFormatada}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick="uiEditarNome(${aluno.id})">Nome</button>
                        <button class="btn-del" onclick="uiDeletar(${aluno.id})">Excluir</button>
                    </td>
                </tr>
            `;
        });
    }

    async function uiListarTodos() {
        renderizarTabela(listarAlunos());
    }

    async function uiCriarAluno() {
        const nome = document.getElementById('nomeNovo').value;
        const email = document.getElementById('emailNovo').value;
        if (!nome || !email) return alert("Preencha tudo!");
        
        await criarAluno(nome, email);
        document.getElementById('nomeNovo').value = "";
        document.getElementById('emailNovo').value = "";
        uiListarTodos();
    }

    async function uiProcurar() {
        const termo = document.getElementById('campoBusca').value;
        if (!termo) return uiListarTodos();
        renderizarTabela(procurar(termo));
    }

    async function uiDeletar(id) {
        if (confirm("Deseja excluir este aluno?")) {
            await deletarAluno(id);
            uiListarTodos();
        }
    }

    async function uiEditarNome(id) {
        const novoNome = prompt("Digite o novo nome:");
        if (novoNome) {
            await atualizarAluno(id, { nome: novoNome });
            uiListarTodos();
        }
    }

    // Iniciar carregando a lista
    uiListarTodos();

</script>

</body>
</html>
